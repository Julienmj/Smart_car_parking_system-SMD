[build]
  publish = "."
  command = "echo 'No build needed for static deployment'"

[[redirects]]
  from = "/api/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/login.php"
  to = "/login.html"
  status = 301

[[redirects]]
  from = "/register.php"
  to = "/register.html"
  status = 301

[[redirects]]
  from = "/dashboard-admin.php"
  to = "/dashboard-admin.html"
  status = 301

[[redirects]]
  from = "/dashboard-client.php"
  to = "/dashboard-client.html"
  status = 301

[[redirects]]
  from = "/payment.php"
  to = "/payment.html"
  status = 301

[[redirects]]
  from = "/*.php"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[build.environment]
  NODE_VERSION = "18"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
