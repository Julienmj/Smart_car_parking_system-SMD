services:
  - type: web
    name: smart-parking-system
    env: php
    plan: free
    buildCommand: "echo 'No build needed for PHP'"
    startCommand: "apache2-foreground"
    healthCheckPath: /health-check.php
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: ${RENDER_EXTERNAL_URL}
      - fromDatabase:
          name: parking-db
          property: DATABASE_URL

databases:
  - name: parking-db
    databaseName: parking_system
    plan: free
